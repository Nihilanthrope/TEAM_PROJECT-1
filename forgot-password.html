<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Laboratory | Forgot Password</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Sora',sans-serif;}
:root{--border:rgba(255,255,255,0.09);--surface:rgba(255,255,255,0.035);--input-bg:#0a0a0a;--muted:#7a7a7a;--danger:#ff5a5a;--success:#4caf8a;}
body{min-height:100vh;display:flex;justify-content:center;align-items:center;background:#040404;color:white;position:relative;overflow:hidden;}
.bg-glow{position:absolute;border-radius:50%;pointer-events:none;}
.bg-glow-1{width:500px;height:500px;background:radial-gradient(circle,rgba(255,255,255,0.04) 0%,transparent 70%);top:-200px;right:-100px;}
.grid-bg{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,0.018) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.018) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;}
.box{width:420px;max-width:93%;background:var(--surface);border:1px solid var(--border);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);padding:44px 40px;border-radius:28px;position:relative;z-index:10;}
.back-link{display:inline-flex;align-items:center;gap:6px;color:var(--muted);text-decoration:none;font-size:13px;margin-bottom:28px;transition:.2s;}
.back-link:hover{color:white;}
.icon{font-size:2.5rem;text-align:center;margin-bottom:16px;}
.logo{text-align:center;margin-bottom:32px;}
.logo h1{font-size:1.7rem;font-weight:700;}
.logo p{color:var(--muted);margin-top:8px;font-size:13px;line-height:1.6;}
.group{margin-bottom:16px;}
.group label{display:block;margin-bottom:7px;color:#c0c0c0;font-size:13px;}
.group input{width:100%;padding:13px 15px;background:var(--input-bg);border:1px solid var(--border);border-radius:12px;color:white;outline:none;font-size:14px;font-family:'Sora',sans-serif;transition:.25s;}
.group input:focus{border-color:rgba(255,255,255,0.22);background:#0f0f0f;}
.group input::placeholder{color:#3a3a3a;}
.submit-btn{width:100%;padding:14px;border:none;border-radius:12px;background:white;color:#050505;font-weight:700;font-size:14px;cursor:pointer;transition:.25s;font-family:'Sora',sans-serif;margin-top:8px;}
.submit-btn:hover:not(:disabled){transform:translateY(-2px);}
.submit-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
.spinner{display:none;width:16px;height:16px;border:2px solid #333;border-top-color:#050505;border-radius:50%;animation:spin .6s linear infinite;margin:0 auto;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading .spinner{display:block;} .loading .btn-text{display:none;}
.alert{padding:12px 14px;border-radius:10px;font-size:13px;margin-bottom:16px;display:none;border:1px solid;}
.alert.show{display:block;}
.alert.err{background:rgba(255,90,90,0.07);border-color:rgba(255,90,90,0.3);color:#ff7a7a;}
.alert.ok{background:rgba(76,175,138,0.07);border-color:rgba(76,175,138,0.3);color:#4caf8a;}
.success-state{text-align:center;display:none;}
.success-state.show{display:block;}
.success-state .icon-big{font-size:3rem;margin-bottom:16px;}
.success-state h2{font-size:1.4rem;font-weight:700;margin-bottom:8px;}
.success-state p{color:var(--muted);font-size:13px;line-height:1.6;}
</style>
</head>
<body>
<div class="bg-glow bg-glow-1"></div>
<div class="grid-bg"></div>

<div class="box">
  <a href="login.html" class="back-link">← Back to Login</a>

  <div id="form-state">
    <div class="icon">🔑</div>
    <div class="logo">
      <h1>Forgot Password?</h1>
      <p>No worries! Enter your email and we'll send you a link to reset your password.</p>
    </div>
    <div class="alert" id="main-alert"></div>
    <div class="group">
      <label>Email Address</label>
      <input type="email" id="email-input" placeholder="you@example.com" autocomplete="email">
    </div>
    <button class="submit-btn" id="submit-btn" onclick="handleSubmit()">
      <span class="btn-text">Send Reset Link</span>
      <div class="spinner"></div>
    </button>
  </div>

  <div class="success-state" id="success-state">
    <div class="icon-big">📬</div>
    <h2>Check your email</h2>
    <p>We've sent a password reset link to your email address.<br><br>
    The link will expire in <strong style="color:white;">1 hour</strong>. If you don't see it, check your spam folder.</p>
    <br>
    <a href="login.html" style="color:var(--muted);font-size:13px;text-decoration:none;">← Back to login</a>
  </div>
</div>

<script>
const API = "https://1c44d2e9-fe15-4ce1-b366-07473449e9ac-00-3l045psk0fh6x.pike.replit.dev/api";

function showAlert(msg,type='err'){const el=document.getElementById('main-alert');el.textContent=msg;el.className=`alert show ${type}`;}
function setLoading(on){const btn=document.getElementById('submit-btn');btn.disabled=on;btn.classList.toggle('loading',on);}

async function handleSubmit(){
  const email=document.getElementById('email-input').value.trim();
  if(!email){showAlert('Please enter your email address.');return;}
  setLoading(true);
  try{
    const res=await fetch(`${API}/auth/forgot-password`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email})});
    const data=await res.json();
    document.getElementById('form-state').style.display='none';
    document.getElementById('success-state').classList.add('show');
  }catch(e){
    showAlert('Cannot reach server. Please try again.');
  }finally{
    setLoading(false);
  }
}

document.addEventListener('keydown',e=>{if(e.key==='Enter')handleSubmit();});
</script>
</body>
</html>
