<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Laboratory| Login</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Sora',sans-serif;}

:root{
  const API = "https://1c44d2e9-fe15-4ce1-b366-07473449e9ac-00-3l045psk0fh6x.pike.replit.dev/api";
  --accent: #e8e8e8;
  --border: rgba(255,255,255,0.09);
  --surface: rgba(255,255,255,0.035);
  --input-bg: #0a0a0a;
  --muted: #7a7a7a;
  --danger: #ff5a5a;
  --success: #4caf8a;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#040404;
  color:white;
  position:relative;
  overflow:hidden;
}

.bg-glow{
  position:absolute;
  border-radius:50%;
  pointer-events:none;
}
.bg-glow-1{width:600px;height:600px;background:radial-gradient(circle,rgba(255,255,255,0.04) 0%,transparent 70%);top:-250px;left:-150px;}
.bg-glow-2{width:400px;height:400px;background:radial-gradient(circle,rgba(255,255,255,0.025) 0%,transparent 70%);bottom:-200px;right:-100px;}

.grid-bg{
  position:absolute;
  inset:0;
  background-image:linear-gradient(rgba(255,255,255,0.018) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.018) 1px,transparent 1px);
  background-size:60px 60px;
  pointer-events:none;
}

.box{
  width:430px;
  max-width:93%;
  background:var(--surface);
  border:1px solid var(--border);
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  padding:44px 40px;
  border-radius:28px;
  position:relative;
  z-index:10;
}

.badge{
  position:absolute;
  top:18px;
  right:20px;
  font-size:10px;
  font-weight:600;
  letter-spacing:2px;
  color:#444;
  text-transform:uppercase;
}

.logo{text-align:center;margin-bottom:32px;}
.logo h1{font-size:2rem;font-weight:700;letter-spacing:-0.5px;}
.logo p{color:var(--muted);margin-top:8px;font-size:14px;font-weight:300;}

.tab-switch{
  display:flex;
  background:#0d0d0d;
  border:1px solid var(--border);
  border-radius:12px;
  padding:4px;
  margin-bottom:26px;
  gap:4px;
}
.tab-btn{
  flex:1;
  padding:9px;
  border:none;
  background:transparent;
  color:var(--muted);
  border-radius:9px;
  font-size:13px;
  font-weight:500;
  cursor:pointer;
  transition:.25s;
  font-family:'Sora',sans-serif;
}
.tab-btn.active{background:rgba(255,255,255,0.08);color:white;}

.group{margin-bottom:16px;}
.group label{display:block;margin-bottom:7px;color:#c0c0c0;font-size:13px;font-weight:400;}
.group input{
  width:100%;
  padding:13px 15px;
  background:var(--input-bg);
  border:1px solid var(--border);
  border-radius:12px;
  color:white;
  outline:none;
  font-size:14px;
  font-family:'Sora',sans-serif;
  transition:.25s;
}
.group input:focus{border-color:rgba(255,255,255,0.22);background:#0f0f0f;}
.group input::placeholder{color:#3a3a3a;}
.group input.error{border-color:var(--danger);}

.input-hint{font-size:11px;margin-top:5px;display:none;}
.input-hint.show{display:block;}
.input-hint.err{color:var(--danger);}
.input-hint.ok{color:var(--success);}

.options{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin:14px 0 22px;
  font-size:13px;
}
.check-wrap{display:flex;align-items:center;gap:7px;color:var(--muted);cursor:pointer;}
.check-wrap input[type=checkbox]{
  width:15px;height:15px;
  accent-color:white;
  cursor:pointer;
}
.options a{color:var(--muted);text-decoration:none;transition:.2s;}
.options a:hover{color:white;}

.submit-btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:white;
  color:#050505;
  font-weight:700;
  font-size:14px;
  cursor:pointer;
  transition:.25s;
  font-family:'Sora',sans-serif;
  position:relative;
  overflow:hidden;
}
.submit-btn:hover:not(:disabled){transform:translateY(-2px);}
.submit-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}

.spinner{
  display:none;
  width:16px;height:16px;
  border:2px solid #333;
  border-top-color:#050505;
  border-radius:50%;
  animation:spin .6s linear infinite;
  margin:0 auto;
}
@keyframes spin{to{transform:rotate(360deg);}}
.loading .spinner{display:block;}
.loading .btn-text{display:none;}

.alert{
  padding:12px 14px;
  border-radius:10px;
  font-size:13px;
  margin-bottom:16px;
  display:none;
  border:1px solid;
}
.alert.show{display:block;}
.alert.err{background:rgba(255,90,90,0.07);border-color:rgba(255,90,90,0.3);color:#ff7a7a;}
.alert.ok{background:rgba(76,175,138,0.07);border-color:rgba(76,175,138,0.3);color:#4caf8a;}

.divider{text-align:center;margin:22px 0;color:#3a3a3a;position:relative;font-size:13px;}
.divider::before,.divider::after{content:"";position:absolute;width:38%;height:1px;background:var(--border);top:50%;}
.divider::before{left:0;}
.divider::after{right:0;}

.socials{display:grid;gap:10px;}
.social-btn{
  padding:13px;
  border-radius:12px;
  border:1px solid var(--border);
  background:var(--input-bg);
  color:#c0c0c0;
  cursor:pointer;
  transition:.25s;
  font-size:13px;
  font-weight:500;
  font-family:'Sora',sans-serif;
  display:flex;align-items:center;justify-content:center;gap:9px;
}
.social-btn:hover{border-color:rgba(255,255,255,0.2);color:white;}

.footer-link{text-align:center;margin-top:24px;color:#555;font-size:13px;}
.footer-link a{color:#a0a0a0;text-decoration:none;font-weight:600;}
.footer-link a:hover{color:white;}

.panel{display:none;}
.panel.active{display:block;}
</style>
</head>
<body>

<div class="bg-glow bg-glow-1"></div>
<div class="bg-glow bg-glow-2"></div>
<div class="grid-bg"></div>

<div class="box">
  <div class="badge">PROJECT LABORATORY</div>

  <div class="logo">
    <h1>Welcome Back 👋</h1>
    <p>Continue your Deterioration journey.</p>
  </div>

  <div class="tab-switch">
    <button class="tab-btn active" onclick="switchTab('login')">Sign In</button>
    <button class="tab-btn" onclick="switchTab('signup')">Create Account</button>
  </div>

  <!-- GLOBAL ALERT -->
  <div class="alert" id="global-alert"></div>

  <!-- ── LOGIN PANEL ── -->
  <div class="panel active" id="panel-login">
    <div class="group">
      <label>Email or Username</label>
      <input type="text" id="login-email" placeholder="you@example.com" autocomplete="username">
    </div>
    <div class="group">
      <label>Password</label>
      <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password">
    </div>
    <div class="options">
      <label class="check-wrap">
        <input type="checkbox" id="remember-me"> Remember me
      </label>
      <a href="#">Forgot password?</a>
    </div>
    <button class="submit-btn" id="login-btn" onclick="handleLogin()">
      <span class="btn-text">Sign In</span>
      <div class="spinner"></div>
    </button>
  </div>

  <!-- ── SIGNUP PANEL ── -->
  <div class="panel" id="panel-signup">
    <div class="group">
      <label>Username</label>
      <input type="text" id="signup-username" placeholder="cooldev42" oninput="validateUsername()" autocomplete="username">
      <div class="input-hint" id="hint-username"></div>
    </div>
    <div class="group">
      <label>Email Address</label>
      <input type="email" id="signup-email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="group">
      <label>Password</label>
      <input type="password" id="signup-pass" placeholder="min 8 characters" oninput="validatePassword()" autocomplete="new-password">
      <div class="input-hint" id="hint-pass"></div>
    </div>
    <div class="group" style="margin-bottom:22px;">
      <label>Confirm Password</label>
      <input type="password" id="signup-confirm" placeholder="repeat password" oninput="validateConfirm()" autocomplete="new-password">
      <div class="input-hint" id="hint-confirm"></div>
    </div>
    <button class="submit-btn" id="signup-btn" onclick="handleSignup()">
      <span class="btn-text">Create Account</span>
      <div class="spinner"></div>
    </button>
  </div>

  <div class="divider">OR</div>

  <div class="socials">
    <button class="social-btn" onclick="oauthAlert('GitHub')">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
      Continue with GitHub
    </button>
    <button class="social-btn" onclick="oauthAlert('Discord')">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="#5865F2"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
      Continue with Discord
    </button>
    <button class="social-btn" onclick="oauthAlert('Google')">
      <svg width="17" height="17" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>
  </div>

</div>

<script>
// ── CONFIG ──────────────────────────────────────────────
const API = "https://1c44d2e9-fe15-4ce1-b366-07473449e9ac-00-3l045psk0fh6x.pike.replit.dev/api"; // ← CHANGE THIS

// ── TAB SWITCH ──────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='signup')));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
  hideAlert();
}

// ── ALERT ───────────────────────────────────────────────
function showAlert(msg, type='err') {
  const el = document.getElementById('global-alert');
  el.textContent = msg;
  el.className = `alert show ${type}`;
}
function hideAlert() {
  document.getElementById('global-alert').className = 'alert';
}

// ── BUTTON LOADING STATE ────────────────────────────────
function setLoading(btnId, on) {
  const btn = document.getElementById(btnId);
  btn.disabled = on;
  btn.classList.toggle('loading', on);
}

// ── INPUT VALIDATION ────────────────────────────────────
function validateUsername() {
  const val = document.getElementById('signup-username').value.trim();
  const hint = document.getElementById('hint-username');
  const inp = document.getElementById('signup-username');
  const ok = /^[a-zA-Z0-9_]{3,20}$/.test(val);
  hint.className = 'input-hint show ' + (ok ? 'ok' : 'err');
  hint.textContent = ok ? '✓ Looks good' : '3-20 chars, letters/numbers/underscore only';
  inp.classList.toggle('error', !ok && val.length > 0);
}

function validatePassword() {
  const val = document.getElementById('signup-pass').value;
  const hint = document.getElementById('hint-pass');
  const inp = document.getElementById('signup-pass');
  const ok = val.length >= 8;
  hint.className = 'input-hint show ' + (ok ? 'ok' : 'err');
  hint.textContent = ok ? '✓ Strong enough' : 'At least 8 characters';
  inp.classList.toggle('error', !ok && val.length > 0);
}

function validateConfirm() {
  const pass = document.getElementById('signup-pass').value;
  const conf = document.getElementById('signup-confirm').value;
  const hint = document.getElementById('hint-confirm');
  const inp = document.getElementById('signup-confirm');
  const ok = pass === conf && conf.length > 0;
  hint.className = 'input-hint show ' + (ok ? 'ok' : 'err');
  hint.textContent = ok ? '✓ Passwords match' : 'Passwords do not match';
  inp.classList.toggle('error', !ok && conf.length > 0);
}

// ── TOKEN HELPERS ────────────────────────────────────────
function saveToken(token, remember) {
  if (remember) {
    localStorage.setItem('nexus_token', token);
  } else {
    sessionStorage.setItem('nexus_token', token);
  }
}

function getToken() {
  return localStorage.getItem('nexus_token') || sessionStorage.getItem('nexus_token');
}

function authHeaders() {
  return {
    'Content-Type': 'application/json',
    'Authorization': `Bearer ${getToken()}`
  };
}

// ── LOGIN ────────────────────────────────────────────────
async function handleLogin() {
  hideAlert();
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-pass').value;
  const remember = document.getElementById('remember-me').checked;

  if (!email || !password) {
    showAlert('Please fill in all fields.');
    return;
  }

  setLoading('login-btn', true);
  try {
    const res = await fetch(`${API}/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (!res.ok) {
      showAlert(data.message || data.error || 'Invalid credentials. Try again.');
      return;
    }

    saveToken(data.token, remember);

    // Award daily login XP (non-blocking)
    awardXP('daily_login').catch(() => {});

    showAlert('Login successful! Redirecting…', 'ok');
    setTimeout(() => {
      window.location.href = 'dashboard.html'; // ← change to your dashboard page
    }, 900);

  } catch (err) {
    showAlert('Cannot reach server. Check your connection.');
    console.error('Login error:', err);
  } finally {
    setLoading('login-btn', false);
  }
}

// ── SIGNUP ───────────────────────────────────────────────
async function handleSignup() {
  hideAlert();
  const username = document.getElementById('signup-username').value.trim();
  const email = document.getElementById('signup-email').value.trim();
  const password = document.getElementById('signup-pass').value;
  const confirm = document.getElementById('signup-confirm').value;

  if (!username || !email || !password || !confirm) {
    showAlert('Please fill in all fields.');
    return;
  }
  if (!/^[a-zA-Z0-9_]{3,20}$/.test(username)) {
    showAlert('Invalid username format.');
    return;
  }
  if (password.length < 8) {
    showAlert('Password must be at least 8 characters.');
    return;
  }
  if (password !== confirm) {
    showAlert('Passwords do not match.');
    return;
  }

  setLoading('signup-btn', true);
  try {
    const res = await fetch(`${API}/auth/signup`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, email, password })
    });

    const data = await res.json();

    if (!res.ok) {
      showAlert(data.message || data.error || 'Signup failed. Username or email may already exist.');
      return;
    }

    saveToken(data.token, false);
    showAlert('Account created! Welcome to Project Nexus 🚀', 'ok');
    setTimeout(() => {
      window.location.href = 'dashboard.html';
    }, 1000);

  } catch (err) {
    showAlert('Cannot reach server. Check your connection.');
    console.error('Signup error:', err);
  } finally {
    setLoading('signup-btn', false);
  }
}

// ── XP HELPER ────────────────────────────────────────────
async function awardXP(activity_type) {
  const token = getToken();
  if (!token) return;
  return fetch(`${API}/xp/award`, {
    method: 'POST',
    headers: authHeaders(),
    body: JSON.stringify({ activity_type })
  });
}

// ── OAUTH PLACEHOLDER ────────────────────────────────────
function oauthAlert(provider) {
  showAlert(`${provider} OAuth coming soon. Use email login for now.`, 'err');
}

// ── ENTER KEY ────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const loginActive = document.getElementById('panel-login').classList.contains('active');
    loginActive ? handleLogin() : handleSignup();
  }
});

// ── AUTO-REDIRECT IF ALREADY LOGGED IN ──────────────────
(async function checkAuth() {
  const token = getToken();
  if (!token) return;
  try {
    const res = await fetch(`${API}/auth/me`, { headers: authHeaders() });
    if (res.ok) window.location.href = 'dashboard.html';
  } catch {}
})();
</script>
</body>
</html>
